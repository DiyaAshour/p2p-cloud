name: Verify

on:
  push:
    branches:
      - big-file-upload-safe
      - main
  pull_request:

jobs:
  verify:
    name: Verify runtime, security, production scripts, IPC contract, renderer data path, large file safety, manifest auth, storage peer safety, bootstrap safety, wallet payment safety, encryption safety, release readiness, and smoke plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security scan
        run: pnpm security:scan

      - name: Production script guard
        run: pnpm production:scan

      - name: IPC contract verification
        run: pnpm verify:ipc

      - name: Renderer Electron-only data path verification
        run: pnpm verify:renderer

      - name: Large file safety verification
        run: pnpm verify:large-files

      - name: Manifest auth safety verification
        run: pnpm verify:manifest-auth

      - name: Storage peer safety verification
        run: pnpm verify:storage-peer

      - name: Bootstrap discovery safety verification
        run: pnpm verify:bootstrap

      - name: Wallet payment safety verification
        run: pnpm verify:wallet-payment

      - name: Encryption safety verification
        run: pnpm verify:encryption

      - name: Release readiness verification
        run: pnpm verify:release

      - name: Release smoke test plan verification
        run: pnpm verify:smoke-plan

      - name: Runtime verification
        run: pnpm verify

      - name: Renderer build
        run: pnpm renderer:build
