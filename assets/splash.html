<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>p2p.cloud</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #09090b; overflow: hidden; font-family: Inter, Arial, sans-serif; }
      .wrap { width: 100%; height: 100%; display: grid; place-items: center; color: #f8fafc; }
      .card { width: 420px; height: 280px; border: 1px solid rgba(255,255,255,.1); border-radius: 28px; background: radial-gradient(circle at 30% 20%, rgba(103,232,249,.22), transparent 35%), radial-gradient(circle at 70% 70%, rgba(139,92,246,.28), transparent 40%), #0f0f12; box-shadow: 0 24px 90px rgba(0,0,0,.45); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
      .logo { width: 92px; height: 92px; border-radius: 24px; background: linear-gradient(135deg, #67e8f9, #8b5cf6 55%, #22c55e); display: grid; place-items: center; box-shadow: 0 18px 60px rgba(139,92,246,.3); }
      .node { width: 46px; height: 46px; border-radius: 50%; background: #09090b; position: relative; }
      .node:before, .node:after { content: ""; position: absolute; border-radius: 50%; background: #e0f2fe; width: 12px; height: 12px; top: -4px; }
      .node:before { left: -8px; box-shadow: 50px 0 0 #e0f2fe, 0 50px 0 #e0f2fe, 50px 50px 0 #e0f2fe; }
      h1 { margin: 0; font-size: 34px; letter-spacing: -.04em; }
      p { margin: 0; color: #a1a1aa; font-size: 14px; }
      .bar { width: 170px; height: 5px; border-radius: 999px; background: #27272a; overflow: hidden; }
      .bar span { display: block; width: 45%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #67e8f9, #8b5cf6, #22c55e); animation: load 1.1s infinite ease-in-out; }
      @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(240%); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="logo"><div class="node"></div></div>
        <div style="text-align:center"><h1>p2p.cloud</h1><p>Starting secure peer node</p></div>
        <div class="bar"><span></span></div>
      </div>
    </div>
  </body>
</html>
